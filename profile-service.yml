server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hireconnect_profile_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  file:
    path: ../logs/profile-service
  level:
    root: INFO
    com.hireconnect.profileservice: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
