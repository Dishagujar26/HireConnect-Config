server:
  port: 8087

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hireconnect_payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: hireconnect_user
    password: password123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

payment:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}

logging:
  file:
    path: ../logs/payment-service
  level:
    root: INFO
    com.hireconnect.paymentservice: DEBUG
    org.springframework.security: INFO
