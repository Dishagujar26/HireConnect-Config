server:
  port: 8080

spring:
  servlet:
    multipart:
      enabled: false

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**
            - id: profile-service
              uri: lb://PROFILE-SERVICE
              predicates:
                - Path=/api/profiles/**
            - id: job-service
              uri: lb://JOB-SERVICE
              predicates:
                - Path=/api/jobs/**
            - id: application-service
              uri: lb://APPLICATION-SERVICE
              predicates:
                - Path=/api/applications/**
            - id: interview-service
              uri: lb://INTERVIEW-SERVICE
              predicates:
                - Path=/api/interviews/**
            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/notifications/**
            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/payments/**
            - id: auth-service-docs
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/aggregate/auth/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: profile-service-docs
              uri: lb://PROFILE-SERVICE
              predicates:
                - Path=/aggregate/profile/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: job-service-docs
              uri: lb://JOB-SERVICE
              predicates:
                - Path=/aggregate/job/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: application-service-docs
              uri: lb://APPLICATION-SERVICE
              predicates:
                - Path=/aggregate/application/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: interview-service-docs
              uri: lb://INTERVIEW-SERVICE
              predicates:
                - Path=/aggregate/interview/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: notification-service-docs
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/aggregate/notification/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: payment-service-docs
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/aggregate/payment/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

logging:
  file:
    path: ../logs/api-gateway
  level:
    com.hireconnect.apigateway: INFO
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: DEBUG

springdoc:
  swagger-ui:
    urls:
      - name: auth-service
        url: /aggregate/auth/v3/api-docs
      - name: profile-service
        url: /aggregate/profile/v3/api-docs
      - name: job-service
        url: /aggregate/job/v3/api-docs
      - name: application-service
        url: /aggregate/application/v3/api-docs
      - name: interview-service
        url: /aggregate/interview/v3/api-docs
      - name: notification-service
        url: /aggregate/notification/v3/api-docs
      - name: payment-service
        url: /aggregate/payment/v3/api-docs
